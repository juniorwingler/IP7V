<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Premium</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
}

header {
  padding: 15px;
  background: #111;
  display: flex;
  justify-content: space-between;
}

header h1 {
  color: red;
}

.hero {
  height: 60vh;
  background: url('https://images.unsplash.com/photo-1601933470928-c9f9e4f95c4f') center/cover;
  display: flex;
  align-items: center;
  padding: 30px;
}

.hero h2 {
  font-size: 40px;
  max-width: 400px;
}

.btn {
  background: red;
  padding: 10px 20px;
  border: none;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

.catalogo {
  padding: 20px;
}

.filmes {
  display: flex;
  overflow-x: auto;
}

.filme {
  min-width: 150px;
  height: 200px;
  margin: 10px;
  background: #222;
  border-radius: 10px;
}

.planos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;
}

.plano {
  background: #111;
  margin: 10px;
  padding: 20px;
  border-radius: 10px;
  width: 220px;
  text-align: center;
}

.preco {
  color: #0f0;
  font-size: 24px;
}

button {
  margin-top: 10px;
}

/* WhatsApp */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25d366;
  padding: 15px;
  border-radius: 50%;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h1>IPTV</h1>
</header>

<section class="hero">
  <div>
    <h2>Filmes, Séries e Canais sem limites</h2>
    <button class="btn" onclick="comprar('Teste Gratis')">TESTE GRÁTIS</button>
  </div>
</section>

<section class="catalogo">
  <h2>Catálogo</h2>
  <div class="filmes">
    <div class="filme"></div>
    <div class="filme"></div>
    <div class="filme"></div>
    <div class="filme"></div>
  </div>
</section>

<section class="planos">

  <div class="plano">
    <h3>15 Dias</h3>
    <div class="preco">R$20</div>
    <button onclick="comprar('15 dias - R$20')">Comprar</button>
  </div>

  <div class="plano">
    <h3>30 Dias</h3>
    <div class="preco">R$30</div>
    <button onclick="comprar('30 dias - R$30')">Comprar</button>
  </div>

  <div class="plano">
    <h3>3 Meses</h3>
    <div class="preco">R$90</div>
    <button onclick="comprar('3 meses - R$90')">Comprar</button>
  </div>

  <div class="plano">
    <h3>1 Ano</h3>
    <div class="preco">R$220</div>
    <button onclick="comprar('1 ano - R$220')">Comprar</button>
  </div>

</section>

<!-- Botão WhatsApp -->
<div class="whatsapp" onclick="comprar">
  💬
</div>

<script>
function comprar(plano) {
  let numero = "5527996410080";
  let mensagem = `Olá, quero comprar o plano ${plano}. Como faço o pagamento via Pix?`;
  let url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
  window.open(url, '_blank');
}
</script>

</body>
</html>
