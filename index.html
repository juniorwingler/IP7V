<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV e P2P num lugar só!</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body {background:#0f172a;color:#fff;}

header {
  background:#020617;
  padding:20px;
  text-align:center;
}
header h1 {color:#22c55e;}

.hero {
  text-align:center;
  padding:50px 20px;
}
.hero h2 {font-size:30px;}
.hero p {color:#cbd5f5;margin:15px 0;}

.planos {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:30px;
}

.plano {
  background:#1e293b;
  margin:15px;
  padding:25px;
  border-radius:12px;
  width:250px;
  text-align:center;
  transition:.3s;
}
.plano:hover {transform:scale(1.05);}

.preco {
  font-size:28px;
  color:#22c55e;
  margin:15px 0;
}

button {
  background:#22c55e;
  border:none;
  padding:12px 20px;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

.pix {
  background:#020617;
  padding:30px;
  text-align:center;
}

.pix-box {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  display:inline-block;
}

footer {
  text-align:center;
  padding:20px;
  background:#020617;
  color:#94a3b8;
}

/* WhatsApp */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:15px;
  border-radius:50%;
  cursor:pointer;
}
</style>

</head>

<body>

<header>
  <h1>Servidor IPTV e P2P Premium</h1>
</header>

<section class="hero">
  <h2>Assista tudo sem travamentos!</h2>
  <p>Filmes, séries e canais liberados.</p>
</section>

<section class="planos">

  <div class="plano">
    <h3>15 Dias</h3>
    <div class="preco">R$ 20</div>
    <button onclick="comprar('15 Dias', 20)">Comprar</button>
  </div>

  <div class="plano">
    <h3>30 Dias</h3>
    <div class="preco">R$ 30</div>
    <button onclick="comprar('30 Dias', 30)">Comprar</button>
  </div>

  <div class="plano">
    <h3>3 Meses</h3>
    <div class="preco">R$ 90</div>
    <button onclick="comprar('3 Meses', 90)">Comprar</button>
  </div>

  <div class="plano">
    <h3>1 Ano</h3>
    <div class="preco">R$ 220</div>
    <button onclick="comprar('1 Ano', 220)">Comprar</button>
  </div>

</section>

<section class="pix">
  <h2>💳 Pagamento via Pix</h2>
  <div class="pix-box">
    <p><strong>Chave Pix:</strong></p>
    <p id="chavePix">2799610080</p>
    <br>
    <button onclick="copiarPix()">Copiar chave</button>
  </div>
</section>

<footer>
  © 2026 IPTV 
</footer>

<div class="whatsapp" onclick="abrirWhatsApp('Olá, quero informações')">
  💬
</div>

<script>
const numero = "5527996410080";

function comprar(plano, valor) {
  let mensagem = `Olá, quero comprar o plano ${plano} no valor de R$ ${valor}. Já posso realizar o pagamento via Pix?`;
  abrirWhatsApp(mensagem);
}

function abrirWhatsApp(msg) {
  let url = `https://wa.me/${numero}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

function copiarPix() {
  let chave = document.getElementById("chavePix").innerText;
  navigator.clipboard.writeText(chave);
  alert("Chave Pix copiada!");
}
</script>

</body>
</html>
